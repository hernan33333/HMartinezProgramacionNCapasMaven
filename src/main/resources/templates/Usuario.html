<html>
    <head>
        <title>GetAllUsuario</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    </head>
    <body class="bg-light">
        <div class="container-fluid py-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="h4 mb-0 text-primary fw-bold">Gestión de usuarios</h2>
                        <span class="badge bg-primary rounded-pill" th:text="${usuarios.size() + ' registrados'}"></span>
                    </div>
                    <form class="row g-3" method="post" role="search" th:object="${usuarioBusqueda}" th:action="@{/usuario/searchusuarios}">
                        <div class="col-md-3">
                            <input class="form-control" th:name="Nombre" th:field="*{Nombre}" type="text" placeholder="Nombre..." aria-label="Search">
                        </div>
                        <div class="col-md-3">
                            <input class="form-control" th:name="ApellidoPaterno" th:field="*{ApellidoPaterno}" type="text" placeholder="Apellido paterno..." aria-label="Search">
                        </div>
                        <div class="col-md-3">
                            <input class="form-control" th:name="ApellidoMaterno" th:field="*{ApellidoMaterno}" type="text" placeholder="Apellido materno..." aria-label="Search">
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" th:field="*{Rol.IdRol}">
                                <option value="0">Seleccione un rol...</option>
                                <option th:each="rol : ${roles}" th:value="${rol.IdRol}" th:text="${rol.Nombre}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-success" type="submit">
                                <i class="bi bi-search"></i> Buscar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-dark">Listado de Usuarios</h5>
                    <a th:href="@{/usuario/formulario}" class="btn btn-success d-flex align-items-center shadow-sm">
                        <i class="bi bi-plus-lg me-2"></i>
                        <span>Nuevo Usuario</span>
                    </a>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Usuario</th>
                                <th>Datos de contacto</th>
                                <th>Direcciones</th>
                                <th>Rol</th>
                                <th class="text-center">Estatus</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="usuario : ${usuarios}">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center">
                                        <img th:src="'data:image/jpeg;base64,' + ${usuario.Imagen}" alt="imagenUsuario" class="card-img-top" th:if="${usuario.Imagen != null}" style="width: 150px; height: auto"/>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16" th:if="${usuario.Imagen == null}">
                                            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                                        </svg>
                                        <div class="row ms-2">
                                            <div class="fw-bold text-dark col-12" th:text="|${usuario.Nombre} ${usuario.ApellidoPaterno} ${usuario.ApellidoMaterno ?: ''}|"></div>
                                            <small class="text-muted col-12" th:text="${'@' + usuario.UserName}"></small>
                                            <small class="text-muted col-12"><i class="bi bi-gender-ambiguous"></i><span class="ms-2" th:text="${usuario.Sexo}"></span></small>
                                            <small class="text-muted col-12"><i class="bi bi-cake2-fill"></i><span class="ms-2" th:text="${usuario.FechaNacimiento}"></span></small>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <div class="d-flex flex-column">
                                        <small class="text-muted"><i class="bi bi-envelope text-muted me-1"></i><span th:text="${usuario.Email}"></span></small>
                                        <small class="text-muted"><i class="bi bi-telephone text-muted me-1"></i><span th:text="${usuario.Telefono}"></span></small>
                                    </div>
                                </td>
                                <td>
                                    <ul class="list-unstyled mb-0 small text-muted">
                                        <li th:each="direccion : ${usuario.Direcciones}">
                                            <i class="bi bi-geo-alt-fill text-danger"></i>
                                            <span th:text="|${direccion.Calle} ${direccion.NumeroExterior} ${direccion.NumeroInterior},
                                                       ${direccion.Colonia.Nombre} ${direccion.Colonia.CodigoPostal}, ${direccion.Colonia.Municipio.Nombre}
                                                        ${direccion.Colonia.Municipio.Estado.Nombre}, ${direccion.Colonia.Municipio.Estado.Pais.Nombre}.|">
                                            </span>
                                        </li>
                                    </ul>
                                </td>
                                <td>
                                    <span class=" badge bg-info-subtle text-info border border-info-subtle rounded-pill px-3" th:text="${usuario.Rol.Nombre}"></span>
                                </td>
                                <td class="text-center">
                                    <div class="form-check form-switch d-inline-block">
                                        <input class="form-check-input" type="checkbox" role="switch" id="switchEstatus" th:value="${usuario.IdUsuario}" th:checked="${usuario.Status == 1 ? 'checked' : 'no'}" onclick="CambiarEstatus(this)">
                                    </div>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="btn-group btn-groups-sm">
                                        <a class="btn btn-outline-warning" th:href="@{/usuario/getbyid/{idusuario}(idusuario= ${usuario.IdUsuario})}">
                                            <i class="bi bi-pen-fill" style="font-size: 15px"></i>
                                        </a>
                                        <a class="btn btn-outline-danger" th:onclick="'ConfirmarEliminacion(' + ${usuario.IdUsuario} + ')'">
                                            <i class="bi bi-trash3-fill" style="font-size: 15px"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer>
        </footer>
    </body>
    
    <script>
        
        function CambiarEstatus(input){
            
            console.log("CHECKED: " + $(input).prop("checked"));
            
            var cambiarStatus = $(input).prop("checked") === true ? 1 : 0;
            
            $.ajax({
               
               url:"usuario/actualizar/" + $(input).val() + "/status/" + cambiarStatus,
               type:"post",
               dataType:"json",
               success: function (data, textStatus, jqXHR) {
                        
                    if (data.correct) {
                        
                        Swal.fire({
                            position: "top-end",
                            icon: "success",
                            title: "Se cambió el status del usuario con éxito",
                            showConfirmButton: false,
                            timer: 1500,
                            didClose: () => {
                                
                                location.reload(true);
                                
                            }
                        });
                        
                    } else {
                        
                        Swal.fire({
                            position: "top-end",
                            icon: "error",
                            title: "Hubo un problema al intentar cambiar el status: " + data.errorMessage,
                            showConfirmButton: false,
                            timer: 1500,
                            didClose: () => {
                                
                                location.reload(true);
                                
                            }
                        });
                        
                    }
                        
                },
                error: function (jqXHR, textStatus, errorThrown) {
                        
                        Swal.fire({
                            title: "Hubo un problema al intentar conectar con el servidor.",
                            icon: "error",
                            draggable: true,
                            didClose: () =>{
                                
                                location.reload(true);
                                
                            }
                        });

                }
            
            });
            
        }
        
    </script>
    
    <script th:if="${successMessage}" th:inline="javascript">
        Swal.fire({
            title: [[${successMessage}]],
            icon: "success",
            draggable: true
        });
    </script>
    
    <script th:if="${successSearchMessage}" th:inline="javascript">
        Swal.fire({
            position: "top-end",
            icon: "success",
            title: [[${successSearchMessage}]],
            showConfirmButton: false,
            timer: 1500
        });
    </script>
    
    <script th:if="${notFoundMessage}" th:inline="javascript">
        Swal.fire({
        icon: "error",
                title: "Auch!",
                text: [[${notFoundMessage}]],
                footer: 
                '<a href="#errorBusquedaVacia" data-bs-toggle="collapse" aria-expanded="false" aria-controls="errorBusquedaVacia" role="button">¿Por qué sucedió esto?</a>\n\
                <div class="collapse" id="errorBusquedaVacia">\n\
                    <div class="card card-body">\n\
                        No hay coincidencias con su búsqueda.\n\
                    </div>\n\
                </div>'
        });
    </script>   
    
    <script th:if="${errorMessageServidorSearch}" th:inline="javascript">
        Swal.fire({
        icon: "error",
                title: "Algo salió mal",
                text: [[${errorMessageServidorSearch}]],
                footer: 
                '<a href="#errorBusquedaServidor" data-bs-toggle="collapse" aria-expanded="false" aria-controls="errorBusquedaServidor" role="button">¿Por qué sucedió esto?</a>\n\
                <div class="collapse" id="errorBusquedaServidor">\n\
                    <div class="card card-body">\n\
                        Hubo un problema desde el servidor. Inténtelo más tarde.\n\
                    </div>\n\
                </div>'
        });
    </script>
    
    <script>
        function ConfirmarEliminacion(IdUsuario){
            
            Swal.fire({
                title: "¿Está seguro que quiere eliminar al usuario?",
                text: "No se podrán revertir los cambios",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                cancelButtonText: "No, cancelar",
                confirmButtonText: "Sí, eliminar"
            }).then((result) => {
                
              if (result.isConfirmed) {
                  
                Swal.fire({
                    title: 'Eliminando...',
                    text: 'Por favor, espere',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });  
                
                $.ajax({
                   
                    url:"usuario/eliminarusuario/" + IdUsuario,
                    type:"DELETE",
                    dataType:"json",
                    success: function(data, textStatus, jqXHR){
                        
                        if (data.correct) {
    
                            Swal.fire({
                                title: "¡Usuario eliminado!",
                                text: "Se eliminó correctamente al usuario y sus direcciones.",
                                icon: "success",
                                didClose: () => {
                                    location.reload(true);
                                }
                            });
                        } else {
                            
                            Swal.fire({
                                icon: "error",
                                title: "¡Algo salió mal!",
                                text: "No se pudo eliminar al usuario.",
                                didClose: () => {
                                    location.reload(true);
                                }
                            });
                            
                        }
                        
                        
                    },
                    error: function(jqXHR, textStatus, errorThrown){
                        
                        Swal.fire({
                            icon: "error",
                            title: "¡Algo salió mal!",
                            text: "Hubo un problema al intentar conectar con el servidor.",
                            didClose: () => {
                                location.reload(true);
                            }
                        });
                    }
                    
                });
                
              }
            });
        }
        
    </script>
    
</html>
